name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and upload"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            case "$tag" in
              v*) ;;
              *) tag="v$tag" ;;
            esac
            echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: rumux
          - runner: macos-13
            target: x86_64-apple-darwin
            bin: rumux
          - runner: macos-14
            target: aarch64-apple-darwin
            bin: rumux
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            bin: rumux.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build CLI
        run: cargo build -p rumux-cli --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.target }}/${{ matrix.bin }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.target }}/${{ matrix.bin }}
          if-no-files-found: error

  publish:
    name: Upload Release Assets
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/raw

      - name: Package archives
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-artifacts

          for dir in dist/raw/*; do
            target="$(basename "$dir")"
            case "$target" in
              x86_64-pc-windows-msvc)
                (cd "$dir" && zip -q "$GITHUB_WORKSPACE/release-artifacts/rumux-${target}.zip" rumux.exe)
                ;;
              *)
                tar -C "$dir" -czf "release-artifacts/rumux-${target}.tar.gz" rumux
                ;;
            esac
          done

          (
            cd release-artifacts
            sha256sum rumux-* > rumux-checksums.txt
          )

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.tag }}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --draft --title "$tag" --generate-notes
          fi

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.prepare.outputs.tag }}" release-artifacts/* --clobber
