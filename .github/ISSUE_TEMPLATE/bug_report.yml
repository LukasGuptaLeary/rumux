name: Bug report
description: Report a reproducible bug in the CLI or desktop app
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Provide exact steps, commands, or clicks.
      placeholder: |
        1. Run ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Rust version, and relevant logs.
      placeholder: |
        OS:
        rustc --version:
        cargo command:
        logs:
    validations:
      required: true
